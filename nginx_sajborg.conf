# Nginx configuration for Sajborg.com
# Copy this file to /etc/nginx/sites-available/sajborg
# Then create a symlink: sudo ln -s /etc/nginx/sites-available/sajborg /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name sajborg.com www.sajborg.com;

    # Redirect all HTTP traffic to HTTPS (after SSL is set up)
    # Uncomment the following lines after running certbot:
    # return 301 https://$server_name$request_uri;
# }

# server {
    # listen 443 ssl http2;
    # server_name sajborg.com www.sajborg.com;

    # SSL certificates (will be added by certbot)
    # ssl_certificate /etc/letsencrypt/live/sajborg.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sajborg.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Client body size limit (for file uploads)
    client_max_body_size 10M;

    # Serve static files directly
    location /static {
        alias /var/www/Sajborg/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve uploaded files directly
    location /uploads {
        alias /var/www/Sajborg/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve favicon
    location = /favicon.ico {
        alias /var/www/Sajborg/static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Serve robots.txt
    location = /robots.txt {
        alias /var/www/Sajborg/static/robots.txt;
        access_log off;
        log_not_found off;
    }

    # Proxy all other requests to Gunicorn
    location / {
        proxy_pass http://unix:/var/www/Sajborg/sajborg.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Logging
    access_log /var/log/nginx/sajborg_access.log;
    error_log /var/log/nginx/sajborg_error.log;
}
