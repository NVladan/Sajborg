# Logrotate configuration for Sajborg.com
# Copy to: /etc/logrotate.d/sajborg

/var/log/gunicorn/sajborg_access.log
/var/log/gunicorn/sajborg_error.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
}

/var/log/nginx/sajborg_access.log
/var/log/nginx/sajborg_error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}
